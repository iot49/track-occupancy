# NanoMQ Configuration
# Docs: https://nanomq.io/docs/en/latest/config-description.html

mqtt {
  property_size = 32
  max_mqueue_len = 2048
  retry_interval = 10s
  keepalive_backoff = 1250
}

listeners.tcp {
  bind = "0.0.0.0:1883"
}

listeners.ws {
  bind = "0.0.0.0:9001"
}

log {
  level = "info"
  console = true
}
