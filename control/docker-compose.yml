services:

  # ── Traefik — reverse proxy, TLS termination, wildcard cert via Cloudflare ──
  traefik:
    container_name: traefik
    image: traefik:v3
    ports:
      - "80:80"
      - "443:443"
      - "8883:8883"
      - "2560:2560"
    environment:
      - CF_DNS_API_TOKEN
      - CF_API_EMAIL
    volumes:
      - traefik-certs:/letsencrypt
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yaml:/etc/traefik/traefik.yaml:ro
      - ./traefik/dynamic_conf.yaml:/etc/traefik/dynamic_conf.yaml:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`traefik.rails49.org`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls.certresolver=myresolver"
      - "traefik.http.routers.api.service=api@internal"
    restart: always

  # ── NanoMQ — MQTT broker ──────────────────────────────────────────────────
  mqtt:
    container_name: mqtt
    image: emqx/nanomq:latest
    volumes:
      - ./mqtt/nanomq.conf:/etc/nanomq.conf:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mqttws.rule=Host(`mqtt.rails49.org`)"
      - "traefik.http.routers.mqttws.entrypoints=websecure"
      - "traefik.http.routers.mqttws.tls.certresolver=myresolver"
      - "traefik.http.services.mqttws.loadbalancer.server.port=9001"
      - "traefik.tcp.routers.mqtttls.rule=HostSNI(`mqtt.rails49.org`)"
      - "traefik.tcp.routers.mqtttls.entrypoints=mqtts"
      - "traefik.tcp.routers.mqtttls.tls.certresolver=myresolver"
      - "traefik.tcp.services.mqtttls.loadbalancer.server.port=1883"
    restart: always

  # ── nginx — serves the built Lit UI (../ui/dist) ─────────────────────────
  nginx:
    container_name: nginx
    image: nginx:alpine
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ui.rule=Host(`ui.rails49.org`)"
      - "traefik.http.routers.ui.entrypoints=websecure"
      - "traefik.http.routers.ui.tls.certresolver=myresolver"
      - "traefik.http.routers.ui.middlewares=local-only@file"
      - "traefik.http.services.ui.loadbalancer.server.port=80"
    volumes:
      - ../ui/dist:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: always

  # ── Track Occupancy Detector ───────────────────────────────────────────────
  track-occupancy:
    container_name: track-occupancy
    build:
      context: ..
      dockerfile: control/track-occupancy/Dockerfile
    environment:
      - MQTT_HOST=mqtt
      - MQTT_PREFIX=rails49
      - R49_PATH=/data/layout.r49
      - MODEL_PATH=/models/model.ort
      - CONFIG_PATH=/models/config.json
      - CAMERA_DEVICE=/dev/video0
      - INTERVAL_MS=${INTERVAL_MS:-1000}
    devices:
      - /dev/video0:/dev/video0
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.occupancy-api.rule=Host(`ui.rails49.org`) && PathPrefix(`/api`)"
      - "traefik.http.routers.occupancy-api.entrypoints=websecure"
      - "traefik.http.routers.occupancy-api.tls.certresolver=myresolver"
      - "traefik.http.routers.occupancy-api.middlewares=local-only@file"
      - "traefik.http.services.occupancy-api.loadbalancer.server.port=3000"
    volumes:
      - ./data:/data
      - ../cnn/models:/models:ro
      - ../dataset/data:/dataset/data:ro
      # Mount source code for fast development
      - ./track-occupancy/src:/repo/control/track-occupancy/src
      - ../lib/r49/src:/repo/lib/r49/src
      - ../lib/classifier/src:/repo/lib/classifier/src
      - ../lib/uid/src:/repo/lib/uid/src
    depends_on:
      - mqtt
    restart: always
    shm_size: '128mb'

  # ── DCC-EX Bridge — serial to MQTT/TCP multiplexer ───────────────────────
  dcc-ex-bridge:
    container_name: dcc-ex-bridge
    build:
      context: ..
      dockerfile: control/dcc-ex-bridge/Dockerfile
    devices:
      - /dev/ttyUSB0:/dev/ttyUSB0
    labels:
      - "traefik.enable=true"
      - "traefik.tcp.routers.dcc.rule=HostSNI(`*`)"
      - "traefik.tcp.routers.dcc.entrypoints=dcc"
      - "traefik.tcp.routers.dcc.middlewares=local-only-tcp@file"
      - "traefik.tcp.services.dcc.loadbalancer.server.port=2560"
    environment:
      - MQTT_HOST=mqtt
      - SERIAL_PORT=/dev/ttyUSB0
    depends_on:
      - mqtt
    restart: always

volumes:
  traefik-certs:
