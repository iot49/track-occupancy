http:
  middlewares:
    # --- Local Network Only Whitelist ---
    # Only allows requests from private IP ranges. 
    # This ensures that even if ports 80/443 are exposed, they are rejected for external IPs.
    local-only:
      ipAllowList:
        sourceRange:
          - "127.0.0.1/32"      # Localhost
          - "192.168.0.0/16"    # Standard home networks
          - "172.16.0.0/12"     # Private B (also used by Docker internally)
          - "10.0.0.0/8"        # Private A

tcp:
  middlewares:
    local-only-tcp:
      ipAllowList:
        sourceRange:
          - "127.0.0.1/32"
          - "192.168.0.0/16"
          - "172.16.0.0/12"
          - "10.0.0.0/8"
